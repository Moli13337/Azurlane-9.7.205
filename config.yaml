server:
  bindAddress: "0.0.0.0"
  port: 80
  gatewayHost: "192.168.31.250"
  gatewayDomain: "line1-login-bili-blhx.bilibiligame.net"
  proxyDomain: "line1-bak-login-bili-blhx.bilibiligame.net"
  gatewayPort: 80
  proxyPort: 0
  name: "AzurLaneServer"
  maintenance: false
  id: 1
  state: 0
  cdnList:
    - "https://bilivideo.cdn.bcebos.com"
  skipVersionHash: true

database:
  driver: "sqlite"
  path: "data/azurlane.db"
  maxPoolSize: 1

data:
  region: "CN"
  dataPath: "resources"
  resourceRepoUrl: "https://github.com/AzurLaneTools/AzurLaneData"

admin:
  enabled: true
  bindAddress: "127.0.0.1"
  port: 8080

sdk:
  enabled: false
  bindAddress: "0.0.0.0"
  port: 443
  httpPort: 8081
  ssl: true

logging:
  level: "INFO"
  packages:
    - "com.azurlane"

auth:
  passwordMinLength: 4
  passwordMaxLength: 128
  nameMinLength: 4
  nameMaxLength: 14
  nameBlacklist: []
  nameIllegalPattern: ""

createPlayer:
  skipOnboarding: true
  starterShips:
    - 101171
    - 201211
  initialResources:
    1: 3000
    2: 500
    4: 0
  initialItems:
    20001: 1
    15003: 10
