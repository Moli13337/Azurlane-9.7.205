syntax = "proto3";

package com.azurlane.proto;

import "common.proto";

message CELLSINFO {
  optional uint32 row = 1;
  optional uint32 column = 2;
  optional uint32 color = 3;
}

message AWARDINFO {
  optional uint32 id = 1;
  repeated DROPINFO award_list = 2;
}

message COLORINFO {
  optional uint32 id = 1;
  optional uint32 number = 2;
}

message ACT_GOODS_INFO {
  optional uint32 id = 1;
  optional uint32 count = 2;
  repeated uint32 bought_record = 3 [packed = false];
}

message ACT_GOODS_BUY {
  optional uint32 itemid = 1;
  optional uint32 count = 2;
}

message BUFF_SLOT {
  optional uint32 pos = 1;
  optional uint32 itemid = 2;
  optional uint32 itemnum = 3;
}

message NINJA_PT {
  optional uint32 b = 1;
  optional uint32 m = 2;
  optional uint32 k = 3;
}

message NINJA_ROLE_RECRUIT {
  optional uint32 id = 1;
  optional uint32 start_time = 2;
}

message NINJA_ADJUST {
  optional uint32 time = 1;
  NINJA_PT left_hp = 2;
  optional uint32 max_level = 3;
}

message NINJA_SUMMARY {
  NINJA_PT summary_pt = 1;
  repeated DROPINFO award_list = 2;
  NINJA_ADJUST adjust = 3;
}

message NINJA_INFO {
  NINJA_PT pt = 1;
  repeated uint32 builds = 2 [packed = false];
  repeated uint32 roles = 3 [packed = false];
  repeated NINJA_ROLE_RECRUIT recruits = 4;
  repeated uint32 buffs = 5 [packed = false];
  optional uint32 max_level = 6;
  optional uint32 cur_level = 7;
  optional uint32 max_display = 8;
  NINJA_ADJUST adjust = 9;
  NINJA_PT summary_pt = 10;
}

message BOSS4TH {
  optional uint32 id = 1;
  optional uint32 boss_hp = 2;
  optional uint32 death = 3;
  optional uint32 hour_traffic = 4;
  optional uint32 hour_off = 5;
}

message MINIGAMEHUB {
  optional uint32 id = 1;
  optional uint32 available_cnt = 2;
  optional uint32 used_cnt = 3;
  optional uint32 ultimate = 4;
  repeated KVDATA2 maxscores = 5;
}

message KEYVALUE {
  optional uint32 key = 1;
  optional uint32 value = 2;
  optional uint32 value2 = 3;
}

message KEYVALUELIST {
  optional uint32 key = 1;
  repeated KEYVALUE value_list = 2;
}

message MINIGAMEDATA {
  optional uint32 id = 1;
  repeated uint32 datas = 2 [packed = false];
  repeated KEYVALUELIST date1_key_value_list = 3;
}

message PB_ACTIVITY_ITEM {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_ISLAND_NODE {
  optional uint32 id = 1;
  optional uint32 event_id = 2;
  optional uint32 is_new = 3;
}

message GAMEROOM {
  optional uint32 roomid = 1;
  optional uint32 max_score = 2;
}

message FRIENDSCORE {
  optional uint32 id = 1;
  optional string name = 2;
  optional uint32 score = 3;
  DISPLAYINFO display = 4;
  optional uint32 time_data = 5;
}

message P_PARTY_ROLE {
  optional uint32 tid = 1;
  optional uint32 bubble = 2;
  optional uint32 speech_bubble = 3;
}

message P_SPECIAL_ROLE {
  optional uint32 tid = 1;
  optional uint32 state = 2;
  optional uint32 gift = 3;
}

message ACT26_GOODS_INFO {
  optional uint32 id = 1;
  optional uint32 count = 2;
}

message ACT26_SELECT_INFO {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

// ============================================================
// 涂色活动 (26001-26008)
// ============================================================

message SC_26001 {
  optional uint32 id = 1;
  repeated CELLSINFO cell_list = 2;
  repeated COLORINFO color_list = 3;
  repeated AWARDINFO award_list = 4;
  optional uint32 start_time = 5;
}

message CS_26002 {
  optional uint32 id = 1;
  optional uint32 act_id = 2;
}

message SC_26003 {
  optional uint32 result = 1;
  repeated DROPINFO drop_list = 2;
}

message CS_26004 {
  optional uint32 id = 1;
  optional uint32 act_id = 2;
  repeated CELLSINFO cell_list = 3;
}

message SC_26005 {
  optional uint32 result = 1;
}

message CS_26006 {
  optional uint32 id = 1;
  optional uint32 act_id = 2;
}

message SC_26007 {
  optional uint32 result = 1;
}

message CS_26008 {
  optional uint32 act_id = 1;
}

