// cmd: 21008 - 获取邀请码 (CS)
message CS_21008 {
  optional uint32 type = 1;
}

// cmd: 21009 - 获取邀请码结果 (SC)
message SC_21009 {
  optional uint32 result = 1;
  optional string invite_code = 2;
}

// cmd: 21010 - 升级 (CS)
message CS_21010 {
  optional uint32 level = 1;
}

// cmd: 21011 - 升级结果 (SC)
message SC_21011 {
  optional uint32 ret = 1;
  repeated DROPINFO drop_list = 2;
}

// cmd: 21012 - 升级类型 (CS)
message CS_21012 {
  optional uint32 type = 1;
}

// cmd: 21013 - 升级类型结果 (SC)
message SC_21013 {
  optional uint32 ret = 1;
}

// cmd: 21014 - 使用物品 (CS)
message CS_21014 {
  optional uint32 type = 1;
  repeated PB_ISLAND_ITEM item_list = 2;
}

// cmd: 21015 - 使用物品结果 (SC)
message SC_21015 {
  optional uint32 result = 1;
  repeated PB_ISLAND_ITEM item_list = 2;
