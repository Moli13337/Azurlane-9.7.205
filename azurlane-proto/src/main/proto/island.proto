// cmd: 21020 - 刷新商店 (CS)
message CS_21020 {
  optional uint32 shop_id = 1;
}

// cmd: 21021 - 刷新商店结果 (SC)
message SC_21021 {
  optional uint32 result = 1;
  PB_SHOP shop_info = 2;
}

// cmd: 21022 - 领取季节奖励 (CS)
message CS_21022 {
  optional uint32 target_pt = 1;
}

// cmd: 21023 - 领取季节奖励结果 (SC)
message SC_21023 {
  optional uint32 result = 1;
  repeated DROPINFO drop_list = 2;
}

// cmd: 21024 - 结算季节 (CS)
