syntax = "proto3";

package com.azurlane.proto;

import "common.proto";

message PB_VECTOR3 {
  optional float x = 1;
  optional float y = 2;
  optional float z = 3;
}

message PB_VECTOR_3 {
  optional float x = 1;
  optional float y = 2;
  optional float z = 3;
}

message PB_QUATERNION {
  optional float x = 1;
  optional float y = 2;
  optional float z = 3;
  optional float w = 4;
}

message PB_ISLAND_ITEM {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_FORMULA_DROP_INFO {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_USE_FORMULA {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_ISLAND_TECH {
  repeated uint32 finish_list = 1 [packed = false];
  repeated PB_REPEAT_FINISH repeat_finish_list = 2;
}

message PB_REPEAT_FINISH {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_ISLAND_APPOINT_AREA_AWARD {
  optional uint32 id = 1;
  optional uint32 ship_id = 2;
  optional uint32 exp = 3;
  optional uint32 formula_id = 4;
  repeated PB_FORMULA_DROP_INFO formula_drop_list = 5;
  optional uint32 main_num = 6;
  optional uint32 other_num = 7;
}

message PB_ISLAND_APPOINT_AREA {
  optional uint32 id = 1;
  repeated uint32 part_list = 2 [packed = false];
  repeated PB_USE_FORMULA formula_list = 3;
}

message PB_ISLAND_HAND_AREA {
  optional uint32 id = 1;
  optional uint32 state = 2;
  optional uint32 formula_id = 3;
  optional uint32 start_time = 4;
  optional uint32 end_time = 5;
}

message PB_ISLAND_SHIP_APPOINT {
  optional uint32 id = 1;
  optional uint32 ship_id = 2;
  optional uint32 max_times = 3;
  optional uint32 get_times = 4;
  optional uint32 formula_id = 5;
  optional uint32 start_time = 6;
  repeated uint32 cost_time_list = 7 [packed = false];
  optional uint32 speed_time = 8;
  optional uint32 times_extra = 9;
}

message PB_ISLAND_BUILD_COLLECT {
  optional uint32 get_num = 1;
  optional uint32 refresh_time = 2;
  repeated PB_FORMULA_DROP_INFO collect_list = 3;
}

message PB_ISLAND_PART_EFFECT {
  optional uint32 num = 1;
  optional uint32 cost_extra = 2;
  optional uint32 main_extra = 3;
  optional uint32 other_extra = 4;
}

message PB_ISLAND_BUILD {
  optional uint32 id = 1;
  repeated PB_ISLAND_SHIP_APPOINT ship_appoint_list = 2;
  repeated PB_ISLAND_APPOINT_AREA_AWARD award_list = 3;
  repeated PB_ISLAND_APPOINT_AREA appoint_list = 4;
  PB_ISLAND_BUILD_COLLECT build_collect = 5;
  repeated PB_ISLAND_HAND_AREA hand_list = 6;
}

message PB_ISLAND_ORDER_SHIP_LOAD {
  optional uint32 id = 1;
  optional uint32 num = 2;
  optional uint32 state = 3;
}

message PB_ISLAND_ORDER_SLOT {
  optional uint32 id = 1;
  optional uint32 type = 2;
  optional uint32 cur_select = 3;
  optional uint32 start_time = 4;
  optional uint32 submit_time = 5;
  optional uint32 position = 6;
  optional uint32 dialog_id = 7;
  repeated PB_ISLAND_ITEM cost = 8;
  optional uint32 order_lv = 9;
  optional uint32 view_flag = 10;
}

message PB_ISLAND_ORDER_SHIP_SLOT {
  optional uint32 id = 1;
  optional uint32 state = 2;
  optional uint32 load_time = 3;
  optional uint32 get_time = 4;
  repeated PB_ISLAND_ORDER_SHIP_LOAD cost = 5;
  repeated PB_ISLAND_ITEM reward = 6;
  optional uint32 finish_num = 7;
  optional uint32 auto_time = 8;
}

message PB_SHIP_ORDER_APPOINT {
  optional uint32 id = 1;
  optional uint32 view_time = 2;
  repeated PB_ISLAND_ITEM cost = 3;
  repeated PB_ISLAND_ITEM reward = 4;
}

message PB_FINISH_ACT_GROUP {
  optional uint32 act_id = 1;
  repeated uint32 groups = 2 [packed = false];
}

message PB_ISLAND_ORDER_SYSTEM {
  optional uint32 favor = 1;
  optional uint32 get_favor = 2;
  optional uint32 daily_select = 3;
  optional uint32 daily_slot_num = 4;
  optional uint32 time_slot_num = 5;
  repeated PB_ISLAND_ORDER_SLOT slot_list = 6;
  repeated PB_ISLAND_ORDER_SHIP_SLOT ship_slot_list = 7;
  repeated PB_SPEED_USE speed_list = 8;
  optional uint32 ship_refresh = 9;
  repeated PB_SHIP_ORDER_APPOINT appoint_list = 10;
  PB_FINISH_ACT_GROUP act_group = 11;
}

message PB_ISLAND_BUFF {
  optional uint32 id = 1;
  optional uint32 start_time = 2;
}

message PB_SHIP_ATTR {
  optional uint32 id = 1;
  optional uint32 value = 2;
}

message PB_SHIP_WORK_PLACE {
  optional uint32 type = 1;
  optional uint32 place = 2;
}

message PB_ISLAND_SHIP {
  optional uint32 id = 1;
  optional uint32 lv = 2;
  optional uint32 exp = 3;
  optional uint32 break_lv = 4;
  optional uint32 skill_lv = 5;
  optional uint32 power = 6;
  optional uint32 recover_time = 7;
  repeated PB_ISLAND_BUFF buff_list = 8;
  repeated PB_SHIP_ATTR extra_attr_list = 9;
  optional uint32 up_limit_state = 10;
  optional uint32 cur_skin_id = 11;
  PB_SHIP_WORK_PLACE work_place = 12;
}

message PB_ISLAND_SHIP_POWER {
  optional uint32 ship_id = 1;
  optional uint32 power = 2;
}

message PB_ISLAND_SHIP_SKIN {
  optional uint32 ship_id = 1;
  repeated uint32 skin_list = 2 [packed = false];
}

message PB_ISLAND_SKIN {
  optional uint32 id = 1;
  optional uint32 color_id = 2;
  repeated uint32 color_list = 3 [packed = false];
}

message PB_ISLAND_CUR_DRESS {
  optional uint32 type = 1;
  optional uint32 id = 2;
}

message PB_ISLAND_DRESS_USER {
  optional uint32 id = 1;
  optional uint32 state = 2;
  optional uint32 color = 3;
  repeated uint32 color_list = 4 [packed = false];
}

message PB_ISLAND_DRESS_NUM {
  optional uint32 id = 1;
  optional uint32 num = 2;
  optional uint32 read = 3;
  optional uint32 time = 4;
}

message PB_ISLAND_SHIP_WEAR {
  optional uint32 ship_id = 1;
  optional uint32 dress_id = 2;
}

message PB_DRESS_COLOR {
  optional uint32 id = 1;
  optional uint32 color = 2;
}

message PB_CAP_STATE {
  optional uint32 dress_id = 1;
  optional uint32 cap_id = 2;
}

message PB_ISLAND_USER_DRESS_SYS {
  PB_ISLAND_CUR_DRESS cur_dress = 1;
  repeated PB_ISLAND_DRESS_NUM had_dress = 2;
  repeated PB_CAP_STATE cap_list = 3;
}

message PB_GAME_TYPE_SHIP {
  optional uint32 game_type = 1;
  optional uint32 ship_id = 2;
}

message PB_ISLAND_SHIP_SYS {
  repeated uint32 invite_list = 1 [packed = false];
  repeated PB_ISLAND_SHIP ship_list = 2;
  repeated PB_ISLAND_DRESS_NUM had_dress = 3;
  repeated PB_ISLAND_SHIP_WEAR wear_list = 4;
  repeated PB_ISLAND_SHIP_SKIN skin_list = 5;
  repeated PB_GAME_TYPE_SHIP game_ship_list = 6;
}

message PB_PLAYER_POS_RECORD {
  optional uint32 map_id = 1;
  PB_VECTOR3 position = 2;
  PB_VECTOR3 rotation = 3;
}

message PB_SLOT {
  optional uint32 slot_id = 1;
  optional uint32 owner_id = 2;
}

message PB_OBJECT {
  optional uint32 id = 1;
  optional uint32 type = 2;
  repeated PB_SLOT slots = 3;
  optional uint32 status = 4;
}

message PB_SYNC_OBJECT {
  optional uint32 id = 1;
  PB_VECTOR_3 pos = 2;
  PB_QUATERNION dir = 3;
  optional uint32 status = 4;
}

message PB_FURNITURE {
  optional uint32 id = 1;
  optional uint32 count = 2;
  optional uint32 time = 3;
}

message PB_FURNITURE_DATA {
  optional uint32 id = 1;
  optional uint32 x = 2;
  optional uint32 y = 3;
  optional uint32 dir = 4;
}

message PB_PLACEMENT_DATA {
  repeated PB_FURNITURE_DATA placed_list = 1;
  optional bytes floor_data = 2;
  optional bytes tile_data = 3;
}

message PB_PLACEMENT_THEME {
  optional uint32 id = 1;
  optional string name = 2;
  PB_PLACEMENT_DATA placed_data = 3;
}

message PB_PLAYER {
  optional uint32 id = 1;
  optional uint32 state = 2;
  optional string name = 3;
  optional uint32 level = 4;
  DISPLAYINFO display = 5;
  optional uint32 map_id = 6;
  PB_ISLAND_CUR_DRESS cur_dress = 7;
  PB_DRESS_COLOR dress_color = 8;
}

message PB_VISITOR {
  optional uint32 id = 1;
  optional string name = 2;
  optional uint32 time = 3;
  optional uint32 cmd = 4;
}

message PB_SHOP {
  optional uint32 id = 1;
  optional uint32 exist_time = 2;
  optional uint32 refresh_time = 3;
  repeated PB_GOODS goods_list = 4;
  optional uint32 refresh_count = 5;
}

message PB_GOODS {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_TASK_PROCESS {
  optional uint32 target_id = 1;
  optional uint32 target_count = 2;
}

message PB_TASK {
  optional uint32 id = 1;
  optional uint32 timestamp = 2;
  repeated PB_TASK_PROCESS process_list = 3;
}

message PB_TASK_RANDOM {
  optional uint32 task_id = 1;
  optional uint32 timestamp = 2;
}

message PB_ISLAND_TASK {
  repeated uint32 task_id_list_finish = 1 [packed = false];
  repeated PB_TASK task_list = 2;
  optional uint32 focus_id = 3;
  repeated PB_TASK_RANDOM task_list_random = 4;
  optional uint32 week_daily_task_num = 5;
}

message PB_ISLAND_SEASON_REVIEW {
  optional uint32 id = 1;
  repeated uint32 count_list = 2 [packed = false];
}

message PB_ISLAND_SEASON {
  optional uint32 id = 1;
  optional uint32 pt = 2;
  repeated uint32 fetch_list = 3 [packed = false];
  repeated uint32 count_list = 4 [packed = false];
}

message PB_ISLAND_GATHER_PUSH {
  optional uint32 id = 1;
  PB_VECTOR3 pos = 2;
  optional uint32 state = 3;
  optional uint32 mark = 4;
  optional uint32 refresh_time = 5;
  optional uint32 push_type = 6;
}

message PB_ISLAND_WILD_GATHER {
  optional uint32 id = 1;
  PB_VECTOR3 pos = 2;
  optional uint32 state = 3;
  optional uint32 mark = 4;
  optional uint32 refresh_time = 5;
}

message PB_ISLAND_COLLECT_ITEM {
  optional uint32 id = 1;
  repeated PB_ISLAND_COLLECT_FRAGMENT had_fragment = 2;
}

message PB_ISLAND_COLLECT_FRAGMENT {
  optional uint32 id = 1;
  PB_VECTOR3 pos = 2;
  optional uint32 mark = 3;
}

message PB_ISLAND_COLLECT_FRAGMENT_PUSH {
  optional uint32 id = 1;
  PB_VECTOR3 pos = 2;
  optional uint32 mark = 3;
  optional uint32 push_type = 4;
}

message PB_ISLAND_COLLECT_SYS {
  repeated PB_ISLAND_COLLECT_ITEM collect_item = 1;
  repeated uint32 finish_list = 2 [packed = false];
}

message PB_TRADE_PRESELL {
  optional uint32 trade_id = 1;
  optional uint32 sell_num_min = 2;
  optional uint32 sell_num_max = 3;
  optional uint32 sell_money_min = 4;
  optional uint32 sell_money_max = 5;
}

message PB_EVENT_EFFECT {
  optional uint32 food_id = 1;
  optional uint32 add_per = 2;
}

message PB_TRADE_NUM {
  optional uint32 trade_id = 1;
  optional uint32 num = 2;
}

message PB_TRADE_POST {
  optional uint32 post_id = 1;
  optional uint32 ship_id = 2;
}

message PB_TRADE_SELL_FOOD {
  optional uint32 food_id = 1;
  optional uint32 num = 2;
  optional uint32 sell_money = 3;
}

message PB_TRADE_FOOD {
  optional uint32 food_id = 1;
  optional uint32 num = 2;
}

message PB_ISLAND_TRADE {
  optional uint32 id = 1;
  optional uint32 lv = 2;
  optional uint32 total_sell = 3;
  repeated PB_TRADE_SELL_FOOD sell_list = 4;
  repeated PB_TRADE_FOOD rest_list = 5;
  repeated PB_TRADE_POST post_list = 6;
  optional uint32 end_time = 7;
  optional uint32 speed_time = 8;
}

message PB_ISLAND_TRADE_SYS {
  optional uint32 today_event = 1;
  optional uint32 today_trade = 2;
  PB_EVENT_EFFECT effect = 3;
  repeated PB_TRADE_NUM today_num = 4;
  repeated PB_ISLAND_TRADE trade_list = 5;
  repeated PB_TRADE_PRESELL presell_list = 6;
}

message PB_ISLAND_ACHIEVENT {
  optional uint32 event_arg = 1;
  optional uint32 event_type = 2;
  optional uint32 value = 3;
}

message PB_ISLAND_ACHIEVEMENT_SYS {
  repeated PB_ISLAND_ACHIEVENT achieve_list = 1;
  repeated uint32 finish_list = 2 [packed = false];
}

message PB_ISLAND_GLOBAL_BUFF {
  repeated PB_ISLAND_BUFF forever_list = 1;
  repeated PB_ISLAND_BUFF limit_list = 2;
}

message PB_SPEEDUP_TICKET {
  optional uint32 key = 1;
  optional uint32 num = 2;
}

message PB_SPEEDUP_KEY {
  optional uint32 speed_id = 1;
  optional uint32 end_time = 2;
}

message PB_SPEED_USE {
  optional uint32 slot_id = 1;
  optional uint32 speed_time = 2;
}

message PB_ISLAND_NPC {
  optional uint32 id = 1;
  optional uint32 object_id = 2;
}

message PB_ISLAND_NPC_PUSH {
  optional uint32 type = 1;
  optional uint32 id = 2;
  optional uint32 object_id = 3;
}

message PB_ISLAND_LABEL {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_SET_FLAG {
  optional uint32 type = 1;
  optional uint32 flag = 2;
}

message PB_BOOK_COND {
  optional uint32 type = 1;
  repeated uint32 unlock_ids = 2 [packed = false];
}

message PB_LV_COLLECT {
  optional uint32 lv = 1;
  optional uint32 value = 2;
}

message PB_BOOK_COLLECT {
  optional uint32 id = 1;
  optional uint32 base = 2;
  repeated PB_LV_COLLECT lv_list = 3;
  repeated PB_LV_COLLECT star_list = 4;
}

message PB_VIEW_BOOK {
  repeated PB_BOOK_COND cond_list = 1;
  repeated uint32 book_list = 2 [packed = false];
  repeated uint32 book_awards = 3 [packed = false];
  repeated PB_BOOK_COLLECT book_collects = 4;
  repeated PB_ISLAND_ITEM item_list = 5;
}

message PB_CARD_IMAGE {
  optional uint32 id = 1;
  optional uint32 num = 2;
}

message PB_FISH_WEIGHT {
  optional uint32 fish_id = 1;
  optional uint32 min_weight = 2;
  optional uint32 max_weight = 3;
  optional uint32 gold_state = 4;
}

message PB_FISH_SYS {
  optional uint32 old_bait = 1;
  optional uint32 fish_rod = 2;
  repeated PB_FISH_WEIGHT fish_weight = 3;
}

message PB_ISLAND_MAKE {
  optional uint32 make_id = 1;
  optional uint32 num = 2;
}

message PB_TRE_SELL_LIST {
  optional uint32 island_id = 1;
  optional uint32 num = 2;
}

message PB_TRE_HISTORY_PRICE {
  optional uint32 timestamp = 1;
  optional uint32 price = 2;
}

message PB_ISLAND_TREASURE {
  optional uint32 week_buy_num = 1;
  repeated PB_TRE_SELL_LIST sell_list = 2;
  repeated PB_TRE_HISTORY_PRICE price_list = 3;
  repeated uint32 invite_list = 4 [packed = false];
}

message PB_GATHER_SHIP {
  optional uint32 ship_id = 1;
  optional uint32 cur_power = 2;
  optional uint32 recover_time = 3;
  optional uint32 add_exp = 4;
}

message PB_BUILD_REFRESH {
  optional uint32 build_id = 1;
  optional uint32 refresh_time = 2;
}

message PB_ISLAND_PUBLIC {
  optional uint32 id = 1;
  optional uint32 level = 2;
  optional uint32 exp = 3;
  optional uint32 storage_level = 4;
  optional string name = 5;
  PB_ISLAND_TECH tech = 6;
  optional uint32 prosperity = 7;
  repeated uint32 ability_list = 8 [packed = false];
  optional uint32 prosperity_rewarded = 9;
  PB_ISLAND_SHIP_SYS ship_sys = 10;
  optional uint32 agora_level = 11;
  PB_PLACEMENT_DATA placed_data = 12;
  repeated PB_SET_FLAG flag_list = 13;
  optional uint32 tree_gift_timestamp = 14;
  optional uint32 tree_gift_count = 15;
  optional uint32 tree_gift_invited = 16;
  optional uint32 tree_gift_visitor = 17;
  PB_ISLAND_TASK task_info = 18;
  PB_ISLAND_TRADE_SYS trade_sys = 19;
  repeated PB_ISLAND_BUILD build_list = 20;
  PB_ISLAND_TREASURE treasure = 21;
}

message PB_ISLAND_PRIVATE {
  optional uint32 open_flag = 1;
  repeated uint32 white_list = 2 [packed = false];
  repeated uint32 black_list = 3 [packed = false];
  repeated PB_VISITOR visitor_history = 4;
  repeated PB_ISLAND_ITEM item_list = 5;
  repeated PB_ISLAND_ITEM item_list_cache = 6;
  repeated PB_FURNITURE furniture_list = 7;
  repeated PB_SHOP shop_list = 8;
  PB_ISLAND_ORDER_SYSTEM order_system = 9;
  optional string invite_code = 10;
  optional uint32 daily_timestamp = 11;
  repeated uint32 daily_list = 12 [packed = false];
  repeated PB_ISLAND_SEASON_REVIEW season_review_list = 13;
  PB_ISLAND_SEASON season = 14;
  PB_ISLAND_COLLECT_SYS collect_sys = 15;
  optional uint32 formula_num = 16;
  PB_ISLAND_USER_DRESS_SYS user_dress = 17;
  PB_ISLAND_ACHIEVEMENT_SYS achievement_sys = 18;
  PB_ISLAND_GLOBAL_BUFF global_buff = 19;
  repeated PB_SPEEDUP_TICKET speed_tickets = 20;
  repeated uint32 action_list = 21 [packed = false];
  repeated uint32 action_feedback_npc_list = 22 [packed = false];
  repeated PB_SET_FLAG flag_list = 23;
  PB_VIEW_BOOK view_book = 24;
  repeated uint32 follow_ships = 25 [packed = false];
  repeated PB_CARD_IMAGE image_list = 26;
  PB_FISH_SYS fish_sys = 27;
}

message PB_ISLAND {
  PB_ISLAND_PUBLIC public_data = 1;
  optional PB_ISLAND_PRIVATE private_data = 2;
}

// ===== CS/SC Messages =====

// cmd: 21000 - 进入岛屿 (CS)
message CS_21000 {
  optional uint32 type = 1;
}

// cmd: 21001 - 进入岛屿结果 (SC)
message SC_21001 {
  optional uint32 ret = 1;
  repeated DROPINFO drop_list = 2;
}

// cmd: 21002 - 设置开关标记 (CS)
message CS_21002 {
  repeated uint32 open_flag = 1 [packed = false];
  repeated uint32 close_flag = 2 [packed = false];
}

// cmd: 21003 - 设置开关标记结果 (SC)
message SC_21003 {
  optional uint32 result = 1;
}

// cmd: 21004 - 修改岛屿名 (CS)
message CS_21004 {
  optional string name = 1;
  optional uint32 type = 2;
}

// cmd: 21005 - 修改岛屿名结果 (SC)
message SC_21005 {
  optional uint32 ret = 1;
}

// cmd: 21006 - 设置标记 (CS)
message CS_21006 {
  optional uint32 type = 1;
}

// cmd: 21007 - 设置标记结果 (SC)
message SC_21007 {
  optional uint32 result = 1;
  repeated PB_ISLAND_ITEM item_list = 2;
