syntax = "proto3";
package com.azurlane.proto;
import "common.proto";

message TBDROP {
  optional uint32 type = 1;
  optional uint32 id = 2;
  optional int32 number = 3;
}

message TBDISPLAY {
  repeated TBDROP benefit_display = 1;
  repeated TBBENEFITVAL dollar_num_display = 2;
  repeated TBBFCOUNTER counter = 3;
}

message TBBENEFITVAL {
  optional uint32 buffid = 1;
  repeated KVDATA benefitval = 2;
}

message TBBFCOUNTER {
  optional uint32 group = 1;
  repeated TBBFCHANGE change = 2;
}

message TBBFCHANGE {
  optional uint32 drop_type = 1;
  optional uint32 drop_id = 2;
  optional uint32 positive_counter = 3;
  optional uint32 negative_counter = 4;
}

message TBDROPS {
  repeated TBDROP base_drop = 1;
  repeated TBDROP benefit_drop = 2;
  optional TBDISPLAY display = 3;
}

message TBROUND {
  optional uint32 round = 1;
  optional uint32 in_temp = 2;
  optional uint32 temp_round = 3;
}

message TBRES {
  repeated KVDATA attrs = 1;
  repeated KVDATA resource = 2;
}

message TBTALENT {
  repeated uint32 talents = 1 [packed = false];
}

message TBPLAN {
  repeated uint32 plan_upgrade = 1 [packed = false];
}

message TBSITE {
  repeated uint32 characters = 1 [packed = false];
  repeated KVDATA work_counter = 2;
  repeated uint32 works = 3 [packed = false];
  repeated KVDATA event_counter = 4;
}

message TBBF {
  optional uint32 id = 1;
  optional uint32 round = 2;
  optional uint32 is_pending = 3;
}

message TBBENEFIT {
  repeated TBBF actives = 1;
}

message TBPERMANENT {
  optional uint32 ng_plus_count = 1;
  repeated uint32 polaroids = 2 [packed = false];
  repeated uint32 endings = 3 [packed = false];
  repeated uint32 active_endings = 4 [packed = false];
  repeated uint32 tarot_archive = 5 [packed = false];
  optional uint32 max_round = 6;
}

message TBFSMCACHEPLAN {
  optional uint32 cur_index = 1;
  repeated KVDATA plans = 2;
}

message TBFSMCACHETALENT {
  optional uint32 finished = 1;
  repeated uint32 talents = 2 [packed = false];
  repeated uint32 retalents = 3 [packed = false];
}

message TBFSMCACHESITE {
  repeated uint32 events = 1 [packed = false];
  repeated uint32 shops = 2 [packed = false];
  repeated KVDATA buys = 3;
  optional KVDATA state = 4;
  repeated uint32 character_this_round = 5 [packed = false];
  optional uint32 refresh_count = 6;
}

message TBFSMCACHECHAT {
  optional uint32 finished = 1;
  repeated uint32 chats = 2 [packed = false];
}

message TBFSMCACHEEND {
  repeated uint32 ends = 1 [packed = false];
  optional uint32 select = 2;
}

message TBFSMCACHEMIND {
}

message TBFSMCACHENIN1 {
  repeated TBDROP selects = 1;
  repeated uint32 reroll_count = 2 [packed = false];
  optional uint32 is_from_shop = 3;
}

message TBFSMCACHEAFFIXUP {
}

message TBFSMCACHETAROT {
}

message TBFSMCACHEEVAL {
  optional uint32 is_finished = 1;
}

message TBFSMCACHE {
  repeated TBFSMCACHEPLAN cache_plan = 1;
  repeated TBFSMCACHETALENT cache_talent = 2;
  repeated TBFSMCACHESITE cache_site = 3;
  repeated TBFSMCACHECHAT cache_chat = 4;
  repeated TBFSMCACHEEND cache_end = 5;
  repeated TBFSMCACHEMIND cache_mind = 6;
  repeated TBFSMCACHENIN1 cache_nin1 = 7;
  repeated TBFSMCACHEAFFIXUP cache_affix_up = 8;
  repeated TBFSMCACHETAROT cache_tarot = 9;
  repeated TBFSMCACHEEVAL cache_eval = 10;
}

message TBFSM {
  optional uint32 system_no = 1;
  optional uint32 current_node = 2;
  repeated TBFSMCACHE cache = 3;
  repeated TBFSM priority_fsm = 4;
  repeated uint32 tarot_selects = 5 [packed = false];
}

message TBINFO {
  optional uint32 id = 1;
  optional TBFSM fsm = 2;
  optional TBROUND round = 3;
  optional TBRES res = 4;
  optional TBTALENT talent = 5;
  optional TBPLAN plan = 6;
  optional TBSITE site = 7;
  repeated KVDATA evaluations = 8;
  optional string name = 9;
  optional uint32 favor_lv = 10;
  optional TBBENEFIT benefit = 11;
  optional uint32 difficulty = 12;
  optional uint32 eval_fail = 13;
  optional TBDISPLAY display = 14;
}

// cmd: 29001 - 获取TB信息
message CS_29001 {
  optional uint32 id = 1;
}

// cmd: 29002 - TB信息响应
message SC_29002 {
