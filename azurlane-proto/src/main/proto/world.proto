syntax = "proto3";
package com.azurlane.proto;
import "common.proto";
import "chapter.proto";
import "shop.proto";

// ============================================================
// 数据结构定义（world独有）
// ============================================================

message LANDINFO {
  optional CHAPTERCELLPOS pos = 1;
  optional uint32 type = 2;
  optional uint32 dir = 3;
  optional uint32 distance = 4;
}

message CHAPTERAWARDINFO {
  optional uint32 id = 1;
  optional uint32 award = 2;
  optional uint32 flag = 3;
}

message MAPINFO {
  optional uint32 id = 1;
  repeated CHAPTERCELLINFO cell_list = 2;
  optional uint32 state_flag = 3;
  repeated LANDINFO land_list = 4;
  repeated CHAPTERCELLPOS pos_list = 5;
}

message COUNTINFO {
  optional uint32 step_count = 1;
  optional uint32 treasure_count = 2;
  optional uint32 task_progress = 3;
  optional uint32 activate_count = 4;
  repeated uint32 collection_list = 5 [packed = false];
}

message WORLDITEMINFO {
  optional uint32 item_type = 1;
  optional uint32 item_id = 2;
  optional uint32 item_flag = 3;
  optional uint32 item_data = 4;
  repeated uint32 buff_list = 5 [packed = false];
  optional uint32 boss_hp = 6;
  repeated uint32 effect_list = 7 [packed = false];
}

message WORLDPOSINFO {
  optional CHAPTERCELLPOS pos = 1;
  repeated WORLDITEMINFO item_list = 2;
}

message WORLDMAPID {
  optional uint32 random_id = 1;
  optional uint32 template_id = 2;
}

message CMDCOLLECTION {
  optional uint32 progress = 1;
  repeated uint32 progress_list = 2 [packed = false];
  optional uint32 random_id = 3;
}

message GROUPCMDCOLLECTION {
  optional uint32 group_id = 1;
  optional CMDCOLLECTION cmd_collection = 2;
}

message ELITEFLEETINFO {
  repeated uint32 ship_id_list = 1 [packed = false];
  repeated uint32 commanders = 2 [packed = false];
}

message WORLD_AI_ACT {
  optional CHAPTERCELLPOS ai_pos = 1;
  optional uint32 strategy_id = 2;
  optional CHAPTERCELLPOS target_pos = 3;
  repeated CHAPTERCELLPOS move_path = 4;
  repeated SHIPINCHAPTER ship_update = 5;
  optional uint32 type = 6;
  repeated CHAPTERCELLPOS pos_list = 7;
}

message MAP_VISION {
  optional uint32 map_id = 1;
  repeated uint32 vision_list = 2 [packed = false];
}

message GROUPINFOUPDATE {
  optional uint32 id = 1;
  repeated uint32 buff_list = 2 [packed = false];
}

message WORLDINFO {
  optional uint32 map_id = 1;
  optional uint32 time = 2;
  repeated GROUPINCHAPTER group_list = 3;
  optional uint32 round = 4;
  optional uint32 task_finish_count = 5;
  repeated uint32 task_list = 6 [packed = false];
  optional uint32 submarine_state = 7;
  repeated WORLDITEMINFO item_list = 8;
  repeated uint32 goods_list = 9 [packed = false];
  optional uint32 action_power = 10;
  optional uint32 action_power_extra = 11;
  optional uint32 last_recover_timestamp = 12;
  optional uint32 action_power_fetch_count = 13;
  optional uint32 last_change_group_timestamp = 14;
  optional uint32 enter_map_id = 15;
  repeated uint32 cd_list = 16 [packed = false];
  repeated uint32 buff_list = 17 [packed = false];
  repeated uint32 chapter_list = 18 [packed = false];
  optional uint32 siren_chapter = 19;
  optional uint32 month_boss = 20;
}

message TASK_INFO {
  optional uint32 id = 1;
  optional uint32 progress = 2;
  optional uint32 accept_time = 3;
  optional uint32 submit_time = 4;
  optional uint32 event_map_id = 5;
}

message PORT_INFO {
  optional uint32 port_id = 1;
  repeated TASK_INFO task_list = 2;
  repeated GOODS_INFO goods_list = 3;
  optional uint32 next_refresh_time = 4;
}

message FLEET_CHANGE {
  optional uint32 group_id = 1;
  optional uint32 ship_id = 2;
}

message BUFF_INFO {
  optional uint32 id = 1;
  optional uint32 stack = 2;
  optional uint32 timestamp = 3;
  optional uint32 round = 4;
  optional uint32 step = 5;
}

message WORLDTARGET_PROCESS {
  optional uint32 trigger_id = 1;
  optional uint32 count = 2;
}

message WORLDTARGET {
  optional uint32 id = 1;
  repeated WORLDTARGET_PROCESS process_list = 2;
}

message WORLDTARGET_FETCH {
  optional uint32 id = 1;
  repeated uint32 star_list = 2 [packed = false];
}

message WORLDBOSS_INFO {
  optional uint32 id = 1;
  optional uint32 template_id = 2;
  optional uint32 lv = 3;
  optional uint32 hp = 4;
  optional uint32 owner = 5;
  optional uint32 last_time = 6;
}

message WORLDBOSS_RANK {
  optional uint32 id = 1;
  optional string name = 2;
  optional uint32 damage = 3;
}

// ============================================================
// cmd: 33000 - 进入大世界 (CS)
// ============================================================

message CS_33000 {
  optional uint32 type = 1;
}

// cmd: 33001 - 大世界初始化响应 (SC)
message SC_33001 {
  optional uint32 result = 1;
  optional WORLDINFO world = 2;
  optional uint32 is_world_open = 3;
  repeated PORT_INFO port_list = 4;
  optional uint32 camp = 5;
  repeated WORLDTARGET target_list = 6;
  repeated WORLDTARGET_FETCH target_fetch_list = 7;
  optional COUNTINFO count_info = 8;
  repeated uint32 out_shop_buy_list = 9 [packed = false];
  optional uint32 clean_chapter = 10;
  repeated CHAPTERAWARDINFO chapter_award = 11;
  repeated FLEET_CHANGE fleet_list = 12;
  repeated uint32 new_flag_port_list = 13 [packed = false];
  repeated KVDATA global_flag_list = 14;
}

// ============================================================
// cmd: 33101 - 进入章节地图 (CS)
// ============================================================

message CS_33101 {
  optional uint32 id = 1;
  optional uint32 enter_map_id = 2;
  repeated ELITEFLEETINFO elite_fleet_list = 3;
  optional uint32 camp = 4;
}

// cmd: 33102 - 进入章节响应 (SC)
message SC_33102 {
  optional uint32 result = 1;
  optional WORLDINFO world = 2;
  repeated CHAPTERAWARDINFO chapter_award = 3;
  optional COUNTINFO count_info = 4;
  repeated PORT_INFO port_list = 5;
  repeated uint32 new_flag_port_list = 6 [packed = false];
}

// ============================================================
// cmd: 33103 - 编队行动 (CS)
// ============================================================

message CS_33103 {
  optional uint32 act = 1;
  optional uint32 group_id = 2;
  optional uint32 act_arg_1 = 3;
  optional uint32 act_arg_2 = 4;
  repeated CHAPTERCELLPOS pos_list = 5;
}

// cmd: 33104 - 编队行动响应 (SC)
message SC_33104 {
  optional uint32 result = 1;
  repeated CHAPTERCELLPOS move_path = 2;
  repeated DROPINFO drop_list = 3;
  optional uint32 enter_map_id = 4;
  repeated SHIPINCHAPTER ship_update = 5;
  repeated WORLD_AI_ACT ai_act_list = 6;
  optional uint32 id = 7;
  repeated LANDINFO land_list = 8;
  optional GROUPINFOUPDATE group_update = 9;
  optional uint32 event_id = 10;
  repeated CHAPTERCELLPOS pos_list = 11;
  optional uint32 action_power = 12;
  optional uint32 action_power_extra = 13;
  repeated WORLDTARGET target_list = 14;
  repeated GROUPCMDCOLLECTION cmd_collection_list = 15;
}

// cmd: 33105 - 编队位置更新推送 (SC)
message SC_33105 {
  repeated CHAPTERCELLPOS pos_list = 1;
}

// ============================================================
// cmd: 33106 - 查询地图信息 (CS)
// ============================================================

message CS_33106 {
  optional uint32 id = 1;
}

// cmd: 33107 - 地图信息响应 (SC)
message SC_33107 {
  optional uint32 result = 1;
  optional MAPINFO map = 2;
  optional uint32 is_reset = 3;
}

// ============================================================
// cmd: 33108 - 退出章节 (CS)
// ============================================================

message CS_33108 {
  optional uint32 type = 1;
}

// cmd: 33109 - 退出章节响应 (SC)
message SC_33109 {
  optional uint32 result = 1;
}

// ============================================================
// cmd: 33110 - AI指令 (CS)
// ============================================================

message CS_33110 {
  optional uint32 type = 1;
  optional uint32 data = 2;
}

// cmd: 33111 - AI指令响应 (SC)
message SC_33111 {
  optional uint32 result = 1;
}

// ============================================================
// cmd: 33112 - 使用策略 (CS)
// ============================================================

message CS_33112 {
  optional uint32 type = 1;
}

// cmd: 33113 - 使用策略响应 (SC)
message SC_33113 {
  optional uint32 result = 1;
  repeated DROPINFO drop_list = 2;
  optional uint32 time = 3;
  optional uint32 siren_chapter = 4;
}

// cmd: 33114 - 塞壬章节推送 (SC)
message SC_33114 {
  optional uint32 is_world_open = 1;
  repeated uint32 ship_id_list = 2 [packed = false];
  repeated uint32 cmd_id_list = 3 [packed = false];
  optional uint32 progress = 4;
}

// ============================================================
// cmd: 33202 - 任务追加推送 (SC)
// ============================================================

message SC_33202 {
  repeated TASK_INFO append_list = 1;
}

// cmd: 33203 - 任务更新推送 (SC)
message SC_33203 {
  repeated TASK_INFO update_list = 1;
}

// cmd: 33204 - 任务删除推送 (SC)
message SC_33204 {
  repeated uint32 delete_list = 1 [packed = false];
}

// ============================================================
// cmd: 33205 - 接受大世界任务 (CS)
// ============================================================

message CS_33205 {
  optional uint32 taskid = 1;
}

// cmd: 33206 - 接受任务响应 (SC)
message SC_33206 {
  optional uint32 result = 1;
  optional TASK_INFO task = 2;
}

// ============================================================
// cmd: 33207 - 提交大世界任务 (CS)
// ============================================================

message CS_33207 {
  optional uint32 taskid = 1;
}

// cmd: 33208 - 提交任务响应 (SC)
message SC_33208 {
  optional uint32 result = 1;
  repeated DROPINFO drops = 2;
  optional uint32 exp = 3;
  optional uint32 intimacy = 4;
}

// ============================================================
// cmd: 33301 - 使用世界物品 (CS)
// ============================================================

message CS_33301 {
  optional uint32 id = 1;
  optional uint32 count = 2;
  optional uint32 arg = 3;
}

// cmd: 33302 - 使用世界物品响应 (SC)
message SC_33302 {
  optional uint32 result = 1;
  repeated DROPINFO drop_list = 2;
}

// ============================================================
// cmd: 33401 - 进入港口 (CS)
// ============================================================

message CS_33401 {
  optional uint32 map_id = 1;
}

// cmd: 33402 - 进入港口响应 (SC)
message SC_33402 {
  optional PORT_INFO port = 1;
}

// ============================================================
// cmd: 33403 - 购买港口商品 (CS)
// ============================================================

message CS_33403 {
  optional uint32 shop_id = 1;
  optional uint32 shop_type = 2;
  optional uint32 count = 3;
}

// cmd: 33404 - 购买港口商品响应 (SC)
message SC_33404 {
  optional uint32 result = 1;
  repeated DROPINFO drop_list = 2;
}

// ============================================================
// cmd: 33405 - 变更舰队编成 (CS)
// ============================================================

message CS_33405 {
  repeated FLEET_CHANGE fleet_list = 1;
}

// cmd: 33406 - 变更舰队编成响应 (SC)
message SC_33406 {
  optional uint32 result = 1;
}

// ============================================================
// cmd: 33407 - 变更舰船装备 (CS)
// ============================================================

message CS_33407 {
  repeated uint32 ship_list = 1 [packed = false];
}

// cmd: 33408 - 变更舰船装备响应 (SC)
message SC_33408 {
  optional uint32 result = 1;
}

// ============================================================
// cmd: 33409 - 设置精英舰队 (CS)
// ============================================================

message CS_33409 {
  repeated ELITEFLEETINFO elite_fleet_list = 1;
}

// cmd: 33410 - 设置精英舰队响应 (SC)
message SC_33410 {
  optional uint32 result = 1;
  repeated GROUPINCHAPTER group_list = 2;
}

// ============================================================
// cmd: 33413 - 刷新港口任务 (CS)
// ============================================================

message CS_33413 {
  optional uint32 type = 1;
}

// cmd: 33414 - 刷新港口任务响应 (SC)
message SC_33414 {
  optional uint32 result = 1;
  repeated TASK_INFO task_list = 2;
  optional uint32 next_refresh_time = 3;
}

// ============================================================
// cmd: 33415 - 提交港口任务 (CS)
// ============================================================

message CS_33415 {
  repeated TASK_INFO task_list = 1;
}

// cmd: 33416 - 提交港口任务响应 (SC)
message SC_33416 {
  optional uint32 result = 1;
  repeated TASK_INFO task_list = 2;
}

// ============================================================
// cmd: 33508 - 世界Boss HP推送 (SC)
// ============================================================

message SC_33508 {
  optional uint32 boss_id = 1;
  optional uint32 hp = 2;
}

// ============================================================
// cmd: 33509 - 世界Boss操作 (CS)
// ============================================================

message CS_33509 {
  optional uint32 type = 1;
}

// cmd: 33510 - 世界Boss操作响应 (SC)
message SC_33510 {
  optional uint32 result = 1;
}

// ============================================================
// cmd: 33601 - 世界目标推送 (SC)
// ============================================================

message SC_33601 {
  repeated WORLDTARGET target_list = 1;
}

// ============================================================
// cmd: 33602 - 领取世界目标奖励 (CS)
// ============================================================

message CS_33602 {
  repeated WORLDTARGET_FETCH list = 1;
}

// cmd: 33603 - 领取世界目标奖励响应 (SC)
message SC_33603 {
  optional uint32 result = 1;
  repeated DROPINFO drops = 2;
}
