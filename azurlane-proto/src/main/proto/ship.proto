syntax = "proto3";

package com.azurlane.proto;

import "common.proto";

message BUILD_INFO {
  optional uint32 pos = 1;
  optional uint32 tid = 2;
}

message GROUPINFO {
  optional uint32 id = 1;
  optional string name = 2;
  repeated uint32 ship_list = 3 [packed = false];
  repeated COMMANDERSINFO commanders = 4;
  optional uint32 fleet_type = 5;
}

message SKIN_FORBIDDEN {
  optional uint32 id = 1;
  optional uint32 type = 2;
  optional uint32 start_time = 3;
  optional uint32 stop_time = 4;
}

message PT_OLD_LOVER_ITEM {
  optional uint32 item_id = 1;
  optional uint32 group_id = 2;
  optional uint32 year = 3;
}

message PT_LOVE_LETTER_MEDAL {
  optional uint32 group_id = 1;
  optional uint32 exp = 2;
  optional uint32 level = 3;
}

message PT_SHIP_LOVE_LETTER {
  optional uint32 group_id = 1;
  repeated uint32 letter_id_list = 2 [packed = false];
}

// ============================================================
// cmd: 12001 - 船坞列表 (SC only, 登录推送)
// ============================================================

message SC_12001 {
  repeated SHIPINFO shiplist = 1;
}

// ============================================================
// cmd: 12002 - 建造舰船请求 (CS)
// ============================================================

message CS_12002 {
  optional uint32 id = 1;
  optional uint32 count = 2;
  optional uint32 costtype = 3;
}

// cmd: 12003 - 建造结果 (SC)
message SC_12003 {
  optional uint32 result = 1;
  repeated BUILDINFO build_info = 2;
}

// ============================================================
// cmd: 12004 - 退役舰船请求 (CS)
// ============================================================

message CS_12004 {
  repeated uint32 ship_id_list = 1 [packed = false];
}

// cmd: 12005 - 退役结果 (SC)
message SC_12005 {
  optional uint32 result = 1;
  repeated uint32 ship_id_list = 2 [packed = false];
}

// ============================================================
// cmd: 12006 - 装备上舰请求 (CS)
// ============================================================

message CS_12006 {
  optional uint32 ship_id = 1;
  optional uint32 equip_id = 2;
  optional uint32 pos = 3;
  optional uint32 type = 4;
}

// cmd: 12007 - 装备结果 (SC)
message SC_12007 {
  optional uint32 result = 1;
}

