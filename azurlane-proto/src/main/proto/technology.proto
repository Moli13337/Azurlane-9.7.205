syntax = "proto3";
package com.azurlane.proto;

import "common.proto";

message TECHNOLOGYINFO {
  optional uint32 id = 1;
  optional uint32 time = 2;
}

message TECHNOLOGYREFRESH {
  optional uint32 id = 1;
  optional uint32 target = 2;
  repeated TECHNOLOGYINFO technologys = 3;
}

message TECHNOLOGYDROP {
  repeated DROPINFO common_list = 1;
  repeated DROPINFO drop_list = 2;
  repeated DROPINFO catchup_list = 3;
  repeated DROPINFO catchupact_list = 4;
}

message DR_NUMBER {
  optional uint32 id = 1;
  optional uint32 number = 2;
}

message TECHPURSUING {
  optional uint32 version = 1;
  optional uint32 number = 2;
  repeated DR_NUMBER dr_numbers = 3;
}

message TECHNOLOGYCATCHUP {
  optional uint32 version = 1;
  optional uint32 target = 2;
  repeated TECHPURSUING pursuings = 3;
}

message BLUPRINTINFO {
  optional uint32 id = 1;
  optional uint32 ship_id = 2;
  optional uint32 start_time = 3;
  optional uint32 blue_print_level = 4;
  optional uint32 exp = 5;
  optional uint32 start_duration = 6;
}

message METACHARINFO {
  optional uint32 id = 1;
  optional uint32 syn_rate = 2;
}

message FINISH_TASK {
  optional uint32 skill_id = 1;
  optional uint32 task_id = 2;
  optional uint32 finish_cnt = 3;
}

message SKILL_EXP {
  optional uint32 skill_id = 1;
  optional uint32 exp = 2;
}

message SKILL_INFO {
  optional uint32 ship_id = 1;
  optional uint32 skill_id = 2;
  optional uint32 skill_level = 3;
  optional uint32 skill_exp = 4;
  optional uint32 day_exp = 5;
  optional uint32 add_exp = 6;
}

message META_SKILL_SIMPLE_INFO {
  optional uint32 ship_id = 1;
  optional uint32 exp = 2;
  optional uint32 skill_id = 3;
  repeated SKILL_EXP skill_exp = 4;
}

message SC_63000 {
  repeated TECHNOLOGYREFRESH refresh_list = 1;
  optional uint32 refresh_flag = 2;
  optional TECHNOLOGYCATCHUP catchup = 3;
  repeated TECHNOLOGYINFO queue = 4;
}

message CS_63001 {
  optional uint32 tech_id = 1;
  optional uint32 refresh_id = 2;
}

message SC_63002 {
  optional uint32 result = 1;
  optional uint32 time = 2;
}

message CS_63003 {
