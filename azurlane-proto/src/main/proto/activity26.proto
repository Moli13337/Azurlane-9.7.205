  optional string guild_name = 3;
  optional uint32 chapter_id = 4;
  optional uint32 marry_number = 5;
  optional uint32 medal_number = 6;
  optional uint32 furniture_number = 7;
  optional uint32 furniture_worth = 8;
  optional uint32 character_id = 9;
  optional uint32 first_lady_id = 10;
  optional string first_lady_name = 11;
  optional uint32 first_lady_time = 12;
  optional uint32 first_online = 13;
  optional uint32 world_max_task = 14;
  optional uint32 collect_num = 15;
  optional uint32 combat = 16;
  optional uint32 ship_num_total = 17;
  optional uint32 ship_num_120 = 18;
  optional uint32 ship_num_125 = 19;
  optional uint32 love200_num = 20;
  optional uint32 skin_num = 21;
  optional uint32 skin_ship_num = 22;
}

